version: '3.9'

networks:
  traefik-public:
    driver: overlay
    attachable: true
  grpc-net:
    driver: overlay

services:
  traefik:
    image: traefik:v3.7
    command:
      - '--providers.swarm.endpoint=unix:///var/run/docker.sock'
      - '--providers.swarm.watch=true'
      - '--providers.swarm.exposedbydefault=false'
      - '--providers.swarm.network=mystack_traefik-public'
      - '--entrypoints.web.address=:80'
      - '--entrypoints.web.http.redirections.entrypoint.to=websecure'
      - '--entrypoints.web.http.redirections.entrypoint.scheme=https'
      - '--entrypoints.web.http.redirections.entrypoint.permanent=true'
      - '--entrypoints.websecure.address=:443'
      - '--certificatesresolvers.letsencrypt.acme.email=danilshkodawork@gmail.com'
      - '--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json'
      - '--certificatesresolvers.letsencrypt.acme.httpchallenge=true'
      - '--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web'
      - '--api.dashboard=true'
      - '--api.insecure=false'
      - '--log.level=DEBUG'
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
    networks:
      - traefik-public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - 'traefik.enable=true'
        - 'traefik.http.routers.dashboard.rule=Host(`dashboard.grpc-swarm.online`)'
        - 'traefik.http.routers.dashboard.entrypoints=websecure'
        - 'traefik.http.routers.dashboard.tls.certresolver=letsencrypt'
        - 'traefik.http.routers.dashboard.service=api@internal'
        - 'traefik.http.routers.dashboard.middlewares=dashboard-auth'
        - 'traefik.http.middlewares.dashboard-auth.basicauth.users=admin:$$apr1$$UnebagYW$$xohYveSSrvDMCsN7qeG0k0'
        - 'traefik.http.services.traefik-svc.loadbalancer.server.port=8080'

  producer:
    image: golova1337/grpc-producer:latest
    networks:
      - traefik-public
      - grpc-net
    environment:
      - PORT=3000
      - GRPC_USERS_URL=consumer:50050
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        order: start-first
        failure_action: pause
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - 'traefik.enable=true'
        - 'traefik.http.routers.producer.rule=Host(`grpc-swarm.online`)'
        - 'traefik.http.routers.producer.entrypoints=websecure'
        - 'traefik.http.routers.producer.tls.certresolver=letsencrypt'
        - 'traefik.http.services.producer.loadbalancer.server.port=3000'

  consumer:
    image: golova1337/grpc-consumer:latest
    networks:
      - grpc-net
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - '9000:9000'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - traefik-public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

volumes:
  traefik-letsencrypt:
  portainer_data: