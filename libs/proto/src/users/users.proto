
// hero/hero.proto
syntax = "proto3";

package users;

service UsersService {
  rpc GetFilteredUsers (GetFilteredUsersRequest) returns (Empty) {}
}

message UserFilter {
  int32 id = 1;
  string name = 2;
  int32 age = 3;
}

message GetFilteredUsersRequest {
  repeated UserFilter users = 1;  
}
message Empty {}